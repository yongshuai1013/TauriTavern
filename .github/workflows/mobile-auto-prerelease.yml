name: Mobile Auto Pre-Release

on:
  schedule:
    - cron: "20 */12 * * *"
  workflow_dispatch:

concurrency:
  group: mobile-auto-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  check-for-new-commits:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check whether this workflow has new commits to build
        id: check
        uses: actions/github-script@v7
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        with:
          script: |
            if (context.eventName !== "schedule") {
              core.setOutput("should_build", "true");
              core.setOutput("reason", `Run requested by ${context.eventName}.`);
              core.info("Manual or non-scheduled run detected, build will proceed.");
              return;
            }

            const workflowRef = process.env.WORKFLOW_REF || "";
            const workflowFile = workflowRef.split("/.github/workflows/")[1]?.split("@")[0];
            if (!workflowFile) {
              throw new Error(`Unable to resolve workflow file from ${workflowRef}`);
            }

            const { owner, repo } = context.repo;
            const branch = context.payload.repository.default_branch;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowFile,
              branch,
              status: "completed",
              per_page: 100,
            });

            const previousRun = runs[0];
            if (!previousRun) {
              core.setOutput("should_build", "true");
              core.setOutput("reason", "No previous completed build was found.");
              core.info("No previous completed build was found, build will proceed.");
              return;
            }

            const shouldBuild = previousRun.head_sha !== context.sha;
            const reason = shouldBuild
              ? `New commit detected: ${context.sha} (previous completed run: ${previousRun.head_sha}).`
              : `No new commits since previous completed run: ${previousRun.head_sha}.`;

            core.setOutput("should_build", shouldBuild ? "true" : "false");
            core.setOutput("reason", reason);
            core.info(reason);

  build-and-publish:
    needs: check-for-new-commits
    if: needs.check-for-new-commits.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android
            platform: ubuntu-latest
            mobile: android
            args: --verbose --apk
          - name: ios
            platform: macos-latest
            mobile: ios
            args: --verbose --debug

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Android host build dependencies
        if: matrix.mobile == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev

      - name: Install Rust toolchain (Android targets)
        if: matrix.mobile == 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Rust toolchain (iOS target)
        if: matrix.mobile == 'ios'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Set up JDK
        if: matrix.mobile == 'android'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Android SDK
        if: matrix.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: matrix.mobile == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build

      - name: Setup Android signing
        if: matrix.mobile == 'android'
        shell: bash
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Setup App Store Connect API key
        if: matrix.mobile == 'ios'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER secret}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY secret}"
          : "${APPLE_API_KEY_P8:?Missing APPLE_API_KEY_P8 secret}"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and upload mobile pre-release
        uses: tauri-apps/tauri-action@acc588b4e23a3fbc5bfc5d77ba29df93f3e43c64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ matrix.mobile == 'android' && steps.setup-ndk.outputs.ndk-path || '' }}
          APPLE_API_ISSUER: ${{ matrix.mobile == 'ios' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.mobile == 'ios' && secrets.APPLE_API_KEY || '' }}
        with:
          tagName: mobile-auto-v__VERSION__
          releaseName: TauriTavern 移动端自动构建 v__VERSION__ / TauriTavern Mobile Auto Build v__VERSION__
          releaseBody: |
            ## 移动端自动构建（预发布）
            这是由 GitHub Actions 自动构建的移动端预发布版本，仅用于测试和体验，不代表稳定正式版。
            覆盖平台：Android / iOS。
            来源提交：${{ github.sha }}

            ## Mobile Auto Build (Pre-release)
            This is an automatically built mobile client pre-release generated by GitHub Actions.
            It is intended for testing and preview only, and is not a stable production release.
            Platforms: Android / iOS.
            Source commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          mobile: ${{ matrix.mobile }}
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          uploadPlainBinary: true
          uploadUpdaterSignatures: false

  skip-build:
    needs: check-for-new-commits
    if: needs.check-for-new-commits.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip build because no new commit was found
        run: echo "${{ needs.check-for-new-commits.outputs.reason }}"
